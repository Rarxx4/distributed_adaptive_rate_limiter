spring:
  application:
    name: distributed_adaptive_rate_limiter

  datasource:
    url: jdbc:postgresql://localhost:5432/rate_limiter
    username: darl
    password: darl_secret
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: darl-pg-pool
      maximum-pool-size: 25
      minimum-idle: 5
      connection-timeout: 5000
      idle-timeout: 300000
      max-lifetime: 600000
      connection-test-query: SELECT 1

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  health:
    redis:
      enabled: true
    db:
      enabled: true

logging:
  level:
    root: INFO
    com.darl.ratelimiter: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

grpc:
  server:
    port: 9090

darl:
  rate-limiter:
    default-algorithm: GCRA
    default-rate-per-second: 100
    default-burst-size: 200
    default-window-seconds: 60

  adaptive:
    enabled: true
    inference-url: http://localhost:8000
    cache-ttl-seconds: 300
    circuit-breaker-threshold: 5

  shadow-mode:
    enabled: true
    experiment-id: exp-001
