# Test profile — PostgreSQL and Redis provided by Testcontainers (@ServiceConnection).
spring:
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

darl:
  rate-limiter:
    default-algorithm: GCRA
    default-rate-per-second: 10
    default-burst-size: 20
    default-window-seconds: 60
  adaptive:
    enabled: false
  shadow-mode:
    enabled: false

# Disable gRPC server in tests to avoid port conflicts
grpc:
  server:
    port: -1

logging:
  level:
    root: WARN
    com.darl.ratelimiter: INFO
