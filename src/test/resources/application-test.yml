# Test profile — PostgreSQL provided by Testcontainers (@ServiceConnection)
# Redis is disabled in tests for Day 1; will add embedded Redis in Day 3

spring:
  flyway:
    enabled: true
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration

  # Disable the StartupValidator trying to hit Redis in tests
darl:
  rate-limiter:
    default-algorithm: SLIDING_WINDOW

logging:
  level:
    root: WARN
    com.darl.ratelimiter: INFO
