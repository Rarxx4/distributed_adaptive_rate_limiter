version: "3.9"

networks:
  darl-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:

services:

  postgres:
    image: postgres:16-alpine
    container_name: darl-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: rate_limiter
      POSTGRES_USER: darl
      POSTGRES_PASSWORD: darl_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - darl-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U darl -d rate_limiter"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.2-alpine
    container_name: darl-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - darl-net

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: darl-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@darl.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    networks:
      - darl-net
    depends_on:
      postgres:
        condition: service_healthy

  # ── Observability stack (Day 13) ──────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: darl-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    networks:
      - darl-net

  grafana:
    image: grafana/grafana:10.4.2
    container_name: darl-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      # Auto-provision the Prometheus datasource and the DARL dashboard
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - darl-net
    depends_on:
      - prometheus
